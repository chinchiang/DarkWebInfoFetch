name: Fetch threat intel feed

on:
  schedule:
    # Twice daily (Taipei/UTC+8): morning fires 04:23, afternoon 12:30.
    # GitHub cron is best-effort and often runs late, so both fire ahead
    # of their target windows (data fresh by ~05:00 and ~13:00-14:30).
    # Scheduled workflows only run on the default branch.
    - cron: "23 20 * * *"
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest posts
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scripts/fetch_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: update threat intel feed"
            git push
          fi
