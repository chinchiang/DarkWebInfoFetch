name: Fetch threat intel feed

on:
  schedule:
    # Every 2 hours (UTC). Note: scheduled workflows only run on the
    # repository's default branch.
    - cron: "15 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest posts
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scripts/fetch_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: update threat intel feed"
            git push
          fi
