name: Fetch threat intel feed

on:
  schedule:
    # Twice daily, targeting 05:00 and 15:00 Taipei time (UTC+8).
    # Triggered at 20:23/06:23 UTC (04:23/14:23 UTC+8): GitHub cron is
    # best-effort and often runs 15-60 min late at popular times like
    # :00, so we fire early on an uncommon minute to have fresh data by
    # 05:00/15:00. Scheduled workflows only run on the default branch.
    - cron: "23 6,20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest posts
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python scripts/fetch_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: update threat intel feed"
            git push
          fi
