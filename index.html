<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DARKWATCH — 暗網威脅情資監控 / Dark Web Threat Intel</title>

<style>
  :root{
    --bg:#0a0512;
    --bg2:#110823;
    --panel:#150c27;
    --panel2:#1d1136;
    --line:#2e1a52;
    --line2:#452a7c;
    --text:#f1eafd;
    --muted:#a495ce;
    --red:#ff2d55;
    --orange:#ff8a1e;
    --purple:#b44dff;
    --blue:#33a6ff;
    --magenta:#ff4dd8;
    --display:'Chakra Petch','Noto Sans TC',system-ui,sans-serif;
    --body:'Noto Sans TC',system-ui,-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{color-scheme:dark}
  body{
    margin:0;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(180,77,255,.14), transparent 60%),
      radial-gradient(900px 420px at 0% 0%, rgba(255,45,85,.10), transparent 55%),
      linear-gradient(var(--bg2), var(--bg) 340px);
    color:var(--text);
    font-family:var(--body);
    font-size:15px;
    line-height:1.65;
    min-height:100vh;
  }
  a{color:var(--blue)}
  button{font:inherit;cursor:pointer}
  :focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:2px}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;justify-content:space-between;align-items:center;gap:1rem;
    padding:.55rem 1.25rem;
    background:rgba(10,5,18,.88);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:var(--display);font-weight:700;font-size:1.05rem;letter-spacing:.22em;
    color:var(--text);white-space:nowrap;
  }
  .brand .slash{color:var(--red)}
  .brand .cursor{color:var(--orange);animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .topbar-right{display:flex;align-items:center;gap:.9rem;min-width:0}
  .clock{font-family:var(--mono);font-size:.78rem;color:var(--muted);letter-spacing:.05em;white-space:nowrap}
  .lang-switch{display:flex;border:1px solid var(--line2);border-radius:3px;overflow:hidden}
  .lang-switch button{
    background:transparent;border:0;color:var(--muted);
    font-family:var(--mono);font-size:.78rem;padding:.3rem .7rem;letter-spacing:.08em;
  }
  .lang-switch button[aria-pressed="true"]{background:var(--purple);color:#12061f;font-weight:600}

  /* ---------- hero ---------- */
  .hero{max-width:1180px;margin:0 auto;padding:2.6rem 1.25rem 1.2rem}
  .eyebrow{
    font-family:var(--mono);font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--orange);margin:0 0 .6rem;
  }
  .hero h1{
    font-family:var(--display);font-weight:700;
    font-size:clamp(1.7rem,4.2vw,2.9rem);line-height:1.12;
    margin:0 0 .55rem;letter-spacing:.02em;text-wrap:balance;
  }
  .hero h1 .hl-red{color:var(--red);text-shadow:0 0 22px rgba(255,45,85,.55)}
  .hero h1 .hl-purple{color:var(--purple);text-shadow:0 0 22px rgba(180,77,255,.55)}
  .tagline{color:var(--muted);max-width:62ch;margin:0 0 1.1rem}
  .meta-row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
  .meta-pill{
    font-family:var(--mono);font-size:.72rem;letter-spacing:.04em;
    padding:.28rem .65rem;border-radius:3px;border:1px solid;
    display:inline-flex;gap:.45ch;align-items:baseline;
    font-variant-numeric:tabular-nums;
  }
  .meta-pill b{font-weight:600}
  .pill-red{color:var(--red);border-color:rgba(255,45,85,.5);background:rgba(255,45,85,.08)}
  .pill-orange{color:var(--orange);border-color:rgba(255,138,30,.5);background:rgba(255,138,30,.08)}
  .pill-blue{color:var(--blue);border-color:rgba(51,166,255,.5);background:rgba(51,166,255,.08)}
  .pill-purple{color:var(--purple);border-color:rgba(180,77,255,.5);background:rgba(180,77,255,.08)}
  .sample-banner{
    margin-top:1rem;padding:.65rem .9rem;border-radius:3px;
    border:1px dashed rgba(255,138,30,.65);background:rgba(255,138,30,.07);
    color:var(--orange);font-size:.83rem;
  }

  /* ---------- controls ---------- */
  .controls{max-width:1180px;margin:0 auto;padding:.4rem 1.25rem 1.2rem;display:grid;gap:.7rem}
  .search{
    width:100%;max-width:520px;
    background:var(--panel);border:1px solid var(--line2);border-radius:3px;
    color:var(--text);font-family:var(--mono);font-size:.86rem;
    padding:.55rem .8rem;
  }
  .search::placeholder{color:var(--muted)}
  .chip-row{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center}
  .chip-label{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-right:.2rem}
  .chip{
    background:var(--panel);border:1px solid var(--line);border-radius:999px;
    color:var(--muted);font-family:var(--mono);font-size:.76rem;
    padding:.26rem .75rem;letter-spacing:.03em;
    display:inline-flex;gap:.5ch;align-items:baseline;
    transition:border-color .15s,color .15s,background .15s;
  }
  .chip .n{font-variant-numeric:tabular-nums;opacity:.75}
  .chip:hover{border-color:var(--line2);color:var(--text)}
  .chip[aria-pressed="true"]{color:#100621;font-weight:600}
  .chip[aria-pressed="true"] .n{opacity:.85}
  .chip-red[aria-pressed="true"]{background:var(--red);border-color:var(--red)}
  .chip-orange[aria-pressed="true"]{background:var(--orange);border-color:var(--orange)}
  .chip-purple[aria-pressed="true"]{background:var(--purple);border-color:var(--purple)}
  .chip-blue[aria-pressed="true"]{background:var(--blue);border-color:var(--blue)}
  .chip-magenta[aria-pressed="true"]{background:var(--magenta);border-color:var(--magenta)}
  .chip-plain[aria-pressed="true"]{background:var(--text);border-color:var(--text)}

  /* ---------- layout ---------- */
  .layout{
    max-width:1180px;margin:0 auto;padding:0 1.25rem 3rem;
    display:grid;grid-template-columns:300px minmax(0,1fr);gap:1.4rem;align-items:start;
  }
  .side-title,.feed-title{
    font-family:var(--mono);font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--muted);margin:0 0 .7rem;
  }
  .side-title em{color:var(--blue);font-style:normal}

  .account{
    width:100%;text-align:left;
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:.7rem .85rem;margin-bottom:.55rem;color:var(--text);
    transition:border-color .15s,transform .15s,box-shadow .15s;
    display:block;
  }
  .account:hover{border-color:var(--line2);transform:translateX(2px)}
  .account[aria-pressed="true"]{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),0 0 18px -6px var(--acc)}
  .account .handle{font-family:var(--mono);font-size:.84rem;font-weight:600;color:var(--acc)}
  .account .cat{
    float:right;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--acc);border:1px solid var(--acc);border-radius:2px;padding:.05rem .35rem;opacity:.9;
  }
  .account .desc{font-size:.78rem;color:var(--muted);margin-top:.25rem;line-height:1.5}
  .account .count{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:.3rem;font-variant-numeric:tabular-nums}

  /* ---------- feed cards ---------- */
  .feed{display:grid;gap:.8rem}
  .card{
    position:relative;
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:.85rem 1rem .8rem 1.15rem;
    transition:border-color .15s,box-shadow .15s;
  }
  .card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--tagc);border-radius:4px 0 0 4px;
    box-shadow:0 0 14px -2px var(--tagc);
  }
  .card:hover{border-color:var(--line2);box-shadow:0 0 24px -12px var(--tagc)}
  .card-head{display:flex;flex-wrap:wrap;gap:.3rem .7rem;align-items:baseline;margin-bottom:.35rem}
  .card-head .handle{font-family:var(--mono);font-size:.84rem;font-weight:600;color:var(--acc);text-decoration:none}
  .card-head .handle:hover{text-decoration:underline}
  .card-head .name{font-size:.78rem;color:var(--muted)}
  .card-head time{margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .card-text{margin:0 0 .55rem;font-size:.9rem;overflow-wrap:anywhere}
  .card-text a{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(51,166,255,.4)}
  .card-foot{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
  .tag{
    font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
    color:var(--tc);border:1px solid var(--tc);border-radius:2px;
    padding:.08rem .42rem;background:color-mix(in srgb,var(--tc) 10%,transparent);
  }
  .open-link{
    margin-left:auto;font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;
    color:var(--orange);text-decoration:none;
  }
  .open-link:hover{text-decoration:underline}
  .empty{
    border:1px dashed var(--line2);border-radius:4px;padding:2.2rem 1rem;
    text-align:center;color:var(--muted);font-family:var(--mono);font-size:.85rem;
  }

  footer{
    border-top:1px solid var(--line);
    padding:1.4rem 1.25rem 2.2rem;
    max-width:1180px;margin:0 auto;
    color:var(--muted);font-size:.8rem;
  }
  footer .foot-line{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em}
  footer .foot-line .dot-red{color:var(--red)}
  footer .foot-line .dot-blue{color:var(--blue)}

  @media (max-width:860px){
    .layout{grid-template-columns:1fr}
    .sidebar{order:2}
    .card-head time{margin-left:0;width:100%}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>

  ]
};

/* ================= state ================= */
function readPref() {
  try { return localStorage.getItem("dw-lang"); } catch (e) { return null; }
}
const state = {
  lang: readPref() || "zh",
  q: "",
  cat: "all",
  tags: new Set(),
  account: null,
  data: SEED
};
const $ = id => document.getElementById(id);
const t = () => I18N[state.lang];

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function linkify(escaped) {
  return escaped.replace(/https?:\/\/[^\s<]+/g, u => `<a href="${u}" target="_blank" rel="noopener noreferrer">${u}</a>`);
}
function timeAgo(isoStr) {
  const then = Date.parse(isoStr);
  if (isNaN(then)) return isoStr || "";
  const s = Math.max(0, (Date.now() - then) / 1000);
  const ago = t().ago;
  if (s < 60) return ago.now;
  if (s < 3600) return ago.m(Math.floor(s / 60));
  if (s < 86400) return ago.h(Math.floor(s / 3600));
  return ago.d(Math.floor(s / 86400));
}
function fmtUtc(isoStr) {
  const d = new Date(isoStr);
  if (isNaN(d)) return "—";
  return d.toISOString().slice(0, 16).replace("T", " ") + " UTC";
}

/* ================= filtering ================= */
function visiblePosts() {
  const q = state.q.trim().toLowerCase();
  return (state.data.posts || []).filter(p => {
    const meta = ACCOUNT_META[p.handle];
    if (state.cat !== "all" && (!meta || meta.category !== state.cat)) return false;
    if (state.account && p.handle !== state.account) return false;
    if (state.tags.size && !(p.tags || []).some(tag => state.tags.has(tag))) return false;
    if (q && !(p.text + " " + p.handle + " " + (p.name || "")).toLowerCase().includes(q)) return false;
    return true;
  });
}

/* ================= rendering ================= */
function renderStatic() {
  const L = t();
  document.documentElement.lang = state.lang === "zh" ? "zh-Hant" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const val = L[el.dataset.i18n];
    if (typeof val === "string") el.textContent = val;
  });
  $("hero-title").innerHTML = L.titleHtml;
  $("search").placeholder = L.searchPlaceholder;
  $("lang-zh").setAttribute("aria-pressed", String(state.lang === "zh"));
  $("lang-en").setAttribute("aria-pressed", String(state.lang === "en"));
}

function chipHtml(id, cls, label, count, pressed) {
  return `<button class="chip ${cls}" data-chip="${id}" aria-pressed="${pressed}">` +
    `${escapeHtml(label)}${count != null ? ` <span class="n">${count}</span>` : ""}</button>`;
}

function renderChips() {
  const L = t();
  const posts = state.data.posts || [];

  const catCounts = { core: 0, strong: 0, extra: 0 };
  posts.forEach(p => {
    const m = ACCOUNT_META[p.handle];
    if (m) catCounts[m.category]++;
  });
  const catNames = { all: L.catAll, core: L.catCore, strong: L.catStrong, extra: L.catExtra };
  let html = `<span class="chip-label">${escapeHtml(L.catLabel)}</span>`;
  html += chipHtml("cat:all", "chip-plain", catNames.all, posts.length, state.cat === "all");
  for (const c of ["core", "strong", "extra"]) {
    html += chipHtml("cat:" + c, CATEGORIES[c].chip, catNames[c], catCounts[c], state.cat === c);
  }
  $("cat-chips").innerHTML = html;

  const tagCounts = {};
  posts.forEach(p => (p.tags || []).forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; }));
  let thtml = `<span class="chip-label">${escapeHtml(L.tagLabel)}</span>`;
  for (const tag of Object.keys(TAGS)) {
    if (!tagCounts[tag]) continue;
    thtml += chipHtml("tag:" + tag, TAGS[tag].chip, L.tagNames[tag] || tag, tagCounts[tag], state.tags.has(tag));
  }
  $("tag-chips").innerHTML = thtml;
}

function renderAccounts() {
  const posts = state.data.posts || [];
  const counts = {};
  posts.forEach(p => { counts[p.handle] = (counts[p.handle] || 0) + 1; });
  const L = t();
  const catNames = { core: L.catCore, strong: L.catStrong, extra: L.catExtra };
  let html = "";
  for (const [handle, meta] of Object.entries(ACCOUNT_META)) {
    const color = CATEGORIES[meta.category].color;
    html += `<button class="account" data-account="${handle}" style="--acc:${color}"` +
      ` aria-pressed="${state.account === handle}">` +
      `<span class="cat">${escapeHtml(catNames[meta.category])}</span>` +
      `<span class="handle">@${handle}</span>` +
      `<div class="desc">${escapeHtml(meta.desc[state.lang])}</div>` +
      `<div class="count">${escapeHtml(L.postsCount(counts[handle] || 0))}</div>` +
      `</button>`;
  }
  $("account-list").innerHTML = html;
}

function renderFeed() {
  const L = t();
  const posts = visiblePosts();
  $("feed-title").textContent = `${L.feedTitle} — ${L.postsCount(posts.length)}`;
  if (!posts.length) {
    $("feed").innerHTML = `<div class="empty">${escapeHtml(L.empty)}</div>`;
    return;
  }
  $("feed").innerHTML = posts.map(p => {
    const meta = ACCOUNT_META[p.handle];
    const accColor = meta ? CATEGORIES[meta.category].color : "var(--muted)";
    const mainTag = (p.tags || ["other"])[0];
    const tagColor = (TAGS[mainTag] || TAGS.other).color;
    const tags = (p.tags || []).map(tag =>
      `<span class="tag" style="--tc:${(TAGS[tag] || TAGS.other).color}">${escapeHtml(t().tagNames[tag] || tag)}</span>`
    ).join("");
    return `<article class="card" style="--tagc:${tagColor};--acc:${accColor}">` +
      `<div class="card-head">` +
        `<a class="handle" href="https://x.com/${p.handle}" target="_blank" rel="noopener noreferrer">@${p.handle}</a>` +
        `<span class="name">${escapeHtml(p.name || (meta ? meta.name : ""))}</span>` +
        `<time datetime="${escapeHtml(p.created_at || "")}" title="${escapeHtml(fmtUtc(p.created_at))}">${escapeHtml(timeAgo(p.created_at))}</time>` +
      `</div>` +
      `<p class="card-text">${linkify(escapeHtml(p.text || ""))}</p>` +
      `<div class="card-foot">${tags}` +
        `<a class="open-link" href="${escapeHtml(p.url || "#")}" target="_blank" rel="noopener noreferrer">${escapeHtml(L.openOnX)}</a>` +
      `</div></article>`;
  }).join("");
}

function renderMeta() {
  const L = t();
  const d = state.data;
  $("updated-at").textContent = fmtUtc(d.generated_at);
  $("source").textContent = L.sources[d.source] || d.source || "—";
  $("post-count").textContent = (d.posts || []).length;
  $("sample-banner").hidden = d.source !== "sample";
}

function renderAll() {
  renderStatic();
  renderMeta();
  renderChips();
  renderAccounts();
  renderFeed();
}

/* ================= events ================= */
document.addEventListener("click", ev => {
  const chip = ev.target.closest("[data-chip]");
  if (chip) {
    const [kind, value] = chip.dataset.chip.split(":");
    if (kind === "cat") state.cat = value;
    else if (kind === "tag") state.tags.has(value) ? state.tags.delete(value) : state.tags.add(value);
    renderChips(); renderFeed();
    return;
  }
  const acc = ev.target.closest("[data-account]");
  if (acc) {
    state.account = state.account === acc.dataset.account ? null : acc.dataset.account;
    renderAccounts(); renderFeed();
  }
});
$("search").addEventListener("input", ev => { state.q = ev.target.value; renderFeed(); });
$("lang-zh").addEventListener("click", () => setLang("zh"));
$("lang-en").addEventListener("click", () => setLang("en"));
function setLang(lang) {
  state.lang = lang;
  try { localStorage.setItem("dw-lang", lang); } catch (e) {}
  renderAll();
}

/* ================= live data + clock ================= */
async function loadLive() {
  try {
    const resp = await fetch("data/feed.json", { cache: "no-store" });
    if (!resp.ok) return;
    const data = await resp.json();
    if (data && Array.isArray(data.posts) && data.posts.length) {
      state.data = data;
      renderAll();
    }
  } catch (err) { /* offline / preview mode — keep seed data */ }
}
function tickClock() {
  $("clock").textContent = new Date().toISOString().slice(0, 19).replace("T", " ") + " UTC";
}

renderAll();
tickClock();
setInterval(tickClock, 1000);
loadLive();
setInterval(loadLive, 10 * 60 * 1000);
</script>
