<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<body data-mode="recent">

<header class="topbar">
  <a class="brand" href="index.html">DARK<span class="slash">//</span>WATCH<span class="cursor">_</span></a>
  <div class="topbar-right">
    <span class="clock" id="clock" aria-hidden="true"></span>
    <div class="lang-switch" role="group" aria-label="Language / 語言">
      <span class="lang-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.6 2.6 3.9 5.6 3.9 9S14.6 18.4 12 21c-2.6-2.6-3.9-5.6-3.9-9S9.4 5.6 12 3Z"/></svg></span>
      <button id="lang-zh" aria-pressed="true">中文</button>
      <button id="lang-en" aria-pressed="false">English</button>
    </div>
  </div>
</header>

<section class="hero">
<div class="hero-text">
  <p class="eyebrow" data-i18n="eyebrow"></p>
  <h1 id="hero-title"></h1>
  <p class="tagline" data-i18n="tagline"></p>
  <div class="meta-row">
    <span class="meta-pill pill-orange"><b data-i18n="updated"></b><span id="updated-at">—</span></span>
    <span class="meta-pill pill-magenta" id="new-count-pill" hidden><b>+<span id="new-count">0</span></b><span data-i18n="newPosts"></span></span>
    <span class="meta-pill pill-blue"><b data-i18n="source"></b><span id="source">—</span></span>
    <span class="meta-pill pill-purple" data-i18n="cadence"></span>
    <span class="meta-pill pill-red"><b id="post-count">0</b><span data-i18n="postsUnit"></span></span>
  </div>
  <div class="alert-bar" id="alert-bar" hidden>
    <span class="alert-ico" id="alert-ico" aria-hidden="true">⚠</span>
    <span class="alert-text" id="alert-text" role="status"></span>
    <button class="alert-view" id="alert-view" hidden></button>
    <label class="watch-wrap"><span data-i18n="watchLabel"></span>
      <select id="watch-country"></select>
    </label>
    <div class="kw-wrap">
      <span class="chip-label" data-i18n="kwLabel"></span>
      <span id="kw-chips"></span>
      <input id="kw-input" class="kw-input" type="text" maxlength="40" autocomplete="off">
    </div>
  </div>
  <div class="sample-banner" id="sample-banner" hidden data-i18n="sampleNotice"></div>
</div>
<div class="hero-art" id="hero-art" aria-hidden="true"></div>
</section>

<nav class="page-tabs" aria-label="Pages">
  <a href="index.html" id="tab-recent" class="tab"></a>
  <a href="archive.html" id="tab-archive" class="tab"></a>
</nav>

<section class="controls">
  <input class="search" id="search" type="search" autocomplete="off">
  <div class="chip-row" id="cat-chips"><span class="chip-label" data-i18n="catLabel"></span></div>
  <div class="chip-row" id="tag-chips"><span class="chip-label" data-i18n="tagLabel"></span></div>
  <div class="chip-row" id="sort-chips"><span class="chip-label" data-i18n="sortLabel"></span></div>
</section>

<main class="layout">
  <aside class="sidebar">
    <h2 class="side-title"><em>▸</em> <span data-i18n="accounts"></span></h2>
    <div id="account-list"></div>
  </aside>
  <section>
    <h2 class="feed-title" id="feed-title"></h2>
    <div class="feed" id="feed" aria-live="polite"></div>
  </section>
</main>

<footer>
  <p class="foot-line"><span class="dot-red">●</span> DARK//WATCH — <span data-i18n="footCadence"></span> · <span class="dot-blue">●</span> <span data-i18n="footSource"></span></p>
  <p data-i18n="footDisclaimer"></p>
</footer>

<script src="assets/app.js"></script>
